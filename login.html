<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mocha — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/login.css">

    <script>
        if (!window.console) {
            window.console = { log: function () { } };
        }

        if (localStorage.getItem("stoat_token")) {
            window.location.replace("app");
        }
    </script>
</head>

<body>

    <header class="top-nav-wrapper custom-titlebar">
        <div class="top-nav-inner titlebar-drag-area">
            <div class="brand-logo">
                <a href="/">
                    <img src="favicon.ico" class="titlebar-icon" alt="" onerror="this.style.display='none'">
                    Mocha
                </a>
            </div>
        </div>

        <div id="electron-controls" class="titlebar-controls" style="display: none;">
            <button id="min-btn" data-i18n-aria="minimize" aria-label="Minimize">−</button>
            <button id="max-btn" data-i18n-aria="maximize" aria-label="Maximize">□</button>
            <button id="close-btn" class="close" data-i18n-aria="close" aria-label="Close">✕</button>
        </div>
    </header>

    <main class="login-card">
        <div id="loginContainer">
            <div id="cardTitle" class="login-title" data-i18n="welcomeBack">Welcome back!</div>
            <div id="cardSubtitle" class="login-subtitle" data-i18n="loginSubtitle">Glad to see you around!</div>

            <div class="form-group" id="emailGroup">
                <div class="form-label" id="emailLabel" data-i18n="email">EMAIL</div>
                <input id="usernameInput" class="form-input" type="text" autocomplete="email" />
            </div>

            <div class="form-group tight" id="passwordGroup">
                <div class="form-label" data-i18n="password">PASSWORD</div>
                <input id="passwordInput" class="form-input" type="password" autocomplete="current-password" />
                <div class="sub-link-text">
                    <a href="#" id="forgotPasswordLink" onclick="showForgotPasswordUI(event)"
                        data-i18n="forgotPassword">Forgot your password?</a>
                </div>
            </div>

            <div class="form-group tight" id="tokenGroup" style="display: none;">
                <div class="form-label" data-i18n="resetVerificationToken">RESET / VERIFICATION TOKEN</div>
                <input id="tokenInput" class="form-input" type="text" data-i18n-placeholder="enterCodeFromEmail"
                    placeholder="Enter code from email" />
            </div>

            <div class="form-group tight" id="newPasswordGroup" style="display: none;">
                <div class="form-label" data-i18n="newPassword">NEW PASSWORD</div>
                <input id="newPasswordInput" class="form-input" type="password" />
            </div>

            <div class="form-group tight">
                <div id="loginStatusMessage" class="status-message" style="display: none;"></div>
            </div>

            <div class="form-group actions">
                <button id="loginButton" class="btn-primary" onclick="handlePrimaryAction()"
                    data-i18n="loginBtn">Login</button>

                <div class="footer-text" id="footerText">
                    <span data-i18n="needAccount">Need an account?</span>
                    <a href="register" data-i18n="register">Register</a>
                </div>
                <div class="footer-text" id="backToLoginText" style="display: none;">
                    <span data-i18n="rememberedIt">Remembered it?</span>
                    <a href="#" onclick="showLoginUI(event)" data-i18n="backToLogin">Back to Login</a>
                </div>
            </div>
        </div>

        <img id="loginLoadingicon" class="loading-spinner-icon" src="/images/buffer120.gif" width="40" height="40"
            alt="Loading..." style="display: none;" />
    </main>

    <script src="/scripts/i18n.js"></script>
    <script src="/scripts/login.js"></script>
    <script src="/scripts/titlebar.js"></script>

    <footer class="landing-footer">
        <p class="disclaimer-text">
            <strong data-i18n="note">Note:</strong> <span data-i18n="disclaimerText">Mocha is a third-party client
                for</span>
            <a href="https://stoat.chat" target="_blank" rel="noopener noreferrer">stoat.chat</a>.
        </p>

        <div class="footer-language-wrapper">
            <select id="loginLanguageSelect" class="footer-language-select">
                <option value="en-US">English (US)</option>
                <option value="fr-CA">Français (Canada)</option>
            </select>
        </div>
    </footer>

</body>

</html>
