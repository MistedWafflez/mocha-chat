<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mocha — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/login.css">

    <script>
        if (!window.console) {
            window.console = { log: function () { } };
        }

        if (localStorage.getItem("stoat_token")) {
            window.location.replace("app");
        }
    </script>
</head>

<body>

    <header class="top-nav-wrapper custom-titlebar">
        <div class="top-nav-inner titlebar-drag-area">
            <div class="brand-logo">
                <a href="/">
                    <img src="favicon.ico" class="titlebar-icon" alt="" onerror="this.style.display='none'">
                    Mocha
                </a>
            </div>
        </div>

        <div id="electron-controls" class="titlebar-controls" style="display: none;">
            <button id="min-btn" aria-label="Minimize">−</button>
            <button id="max-btn" aria-label="Maximize">□</button>
            <button id="close-btn" class="close" aria-label="Close">✕</button>
        </div>
    </header>

    <main class="login-card">
        <div id="loginContainer">
            <div id="cardTitle" class="login-title">Welcome back!</div>
            <div id="cardSubtitle" class="login-subtitle">Glad to see you around!</div>

            <div class="form-group" id="emailGroup">
                <div class="form-label" id="emailLabel">EMAIL</div>
                <input id="usernameInput" class="form-input" type="text" autocomplete="email" />
            </div>

            <div class="form-group tight" id="passwordGroup">
                <div class="form-label">PASSWORD</div>
                <input id="passwordInput" class="form-input" type="password" autocomplete="current-password" />
                <div class="sub-link-text">
                    <a href="#" id="forgotPasswordLink" onclick="showForgotPasswordUI(event)">Forgot your password?</a>
                </div>
            </div>

            <div class="form-group tight" id="tokenGroup" style="display: none;">
                <div class="form-label">RESET / VERIFICATION TOKEN</div>
                <input id="tokenInput" class="form-input" type="text" placeholder="Enter code from email" />
            </div>

            <div class="form-group tight" id="newPasswordGroup" style="display: none;">
                <div class="form-label">NEW PASSWORD</div>
                <input id="newPasswordInput" class="form-input" type="password" />
            </div>

            <div class="form-group tight">
                <div id="loginStatusMessage" class="status-message" style="display: none;"></div>
            </div>

            <div class="form-group actions">
                <button id="loginButton" class="btn-primary" onclick="handlePrimaryAction()">Login</button>

                <div class="footer-text" id="footerText">
                    Need an account? <a href="register">Register</a>
                </div>
                <div class="footer-text" id="backToLoginText" style="display: none;">
                    Remembered it? <a href="#" onclick="showLoginUI(event)">Back to Login</a>
                </div>
            </div>
        </div>

        <img id="loginLoadingicon" class="loading-spinner-icon" src="/images/buffer120.gif" width="40" height="40"
            alt="Loading..." style="display: none;" />
    </main>

    <script src="/scripts/login.js"></script>
    <script src="/scripts/titlebar.js"></script>

    <footer class="landing-footer">
        <p class="disclaimer-text">
            <strong>Note:</strong> Mocha is a third-party client for <a href="https://stoat.chat" target="_blank"
                rel="noopener noreferrer">stoat.chat</a>.
        </p>
    </footer>

</body>

</html>
