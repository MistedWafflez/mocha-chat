<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mocha — Chat & Community</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/landing.css">

    <script>
        if (!window.console) {
            window.console = { log: function () { } };
        }
    </script>
</head>

<body>

    <header class="landing-nav-bar">
        <div class="landing-nav-container">
            <div class="brand-logo">Mocha</div>

            <a href="/login">
                <div class="nav-btn nav-btn-primary" data-i18n="openMocha">Open Mocha</div>
            </a>

            <a href="//mistedwafflez.com">
                <div class="nav-btn nav-btn-secondary">MistedWafflez</div>
            </a>

            <a href="/download">
                <div class="nav-btn nav-btn-secondary" data-i18n="download">Download</div>
            </a>
        </div>
    </header>

    <footer class="landing-footer">
        <p class="disclaimer-text">
            <strong data-i18n="note">Note:</strong>
            <span data-i18n="disclaimerTextLanding">Mocha is an independent, third-party client for</span>
            <a href="https://stoat.chat" target="_blank" rel="noopener noreferrer">stoat.chat</a>
            <span data-i18n="disclaimerTextLandingPost">and is not officially affiliated with or endorsed by stoat.chat.</span>
        </p>

        <div class="footer-language-wrapper">
            <select id="indexLanguageSelect" class="footer-language-select">
                <option value="en-US">English (US)</option>
                <option value="fr-CA">Français (Canada)</option>
            </select>
        </div>
    </footer>

    <script src="/scripts/i18n.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const langSelect = document.getElementById("indexLanguageSelect");
            if (langSelect) {
                langSelect.value = typeof currentLang === "function" ? currentLang() : "en-US";
                langSelect.addEventListener("change", (e) => {
                    localStorage.setItem("preferred_lang", e.target.value);
                    if (typeof updatePageTranslations === "function") {
                        updatePageTranslations();
                    }
                });
            }

            if (typeof updatePageTranslations === "function") {
                updatePageTranslations();
            }
        });
    </script>

</body>

</html>
